server:
  port: 8080

spring:
  application:
    name: job-portal-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/job_portal}
    username: ${DATABASE_USERNAME:job_portal}
    password: ${DATABASE_PASSWORD:job_portal}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-change-this-development-secret}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    org.springframework.security: INFO
